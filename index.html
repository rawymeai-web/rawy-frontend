<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rawy - Where Every Child Becomes the Hero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-orange': '#F78F50', // Primary Coral
            'brand-teal': '#006B5D',   // Deep Teal
            'brand-yellow': '#ECC156', // Soft Yellow
            'brand-navy': '#001A40',   // Deep Navy
            'surface-paper': '#FFF9F0', 
            'glass-white': 'rgba(255, 255, 255, 0.45)',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'Tajawal', 'sans-serif'],
            arabic: ['Tajawal', 'sans-serif'],
          },
          borderRadius: {
            'xl': '1rem',
            '2xl': '2rem',
            '3xl': '3rem',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'blob': 'blob 10s infinite',
            'sparkle': 'sparkle 2s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            sparkle: {
              '0%, 100%': { opacity: 0.5, transform: 'scale(1)' },
              '50%': { opacity: 1, transform: 'scale(1.2)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes page-enter-forward {
      from { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }

    .animate-enter-forward {
      animation: page-enter-forward 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px rgba(36, 58, 97, 0.08);
    }

    .bg-noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .blob {
      position: fixed;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Custom scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes stitch-slide-in {
      0% { opacity: 0; transform: translateX(20px) scale(0.98); filter: blur(10px); }
      100% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    }

    @keyframes stitch-fade-out {
      0% { opacity: 1; transform: scale(1); filter: blur(0); }
      100% { opacity: 0; transform: scale(1.05); filter: blur(5px); }
    }

    .animate-stitch-in {
      animation: stitch-slide-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .animate-stitch-out {
      animation: stitch-fade-out 0.4s ease-in forwards;
    }

    body {
      background-color: #FFF9F0;
      color: #001A40;
    }
  </style>


</head>

<body>
  <div id="root"></div>
  <div class="bg-noise"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
